# ============================================================
#  tmux ZenGarden — modern 256-color config
#  Compatible: macOS (Apple Silicon / Intel), Linux (DGX Spark)
# ============================================================

# ── Terminal & Colors ────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",ghostty:RGB"
set -ag terminal-overrides ",*256col*:Tc"

# ── General ──────────────────────────────────────────────────
set -g history-limit 100000
set -g display-time 3000
set -g status-interval 5
set -g focus-events on
set -g escape-time 10
setw -g aggressive-resize on
# Extended key reporting — lets Ghostty/kitty protocol disambiguate
# Ctrl+| vs Ctrl+\, Ctrl+Tab, Ctrl+Alt combos, etc.
set -g extended-keys on

# ── Mouse ────────────────────────────────────────────────────
set -g mouse on
# OSC 52 clipboard — lets nested tmux propagate copy up to Ghostty
set -g set-clipboard on
# Allow DCS passthrough so TUI apps (e.g. OpenCode) can send OSC 52
# through nested tmux layers; "on" limits to the active pane only
# (-q silences "invalid option" on tmux < 3.3 which lacks this option)
set -gq allow-passthrough on

# ── Index from 1 (easier keyboard access) ────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Prefix: Ctrl-Space ───────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Reload ───────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display " Config reloaded"

# ── Vi mode ──────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v              send -X begin-selection
bind -T copy-mode-vi y              send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v            send -X rectangle-toggle
# Mouse drag in copy mode → copy to clipboard (works in nested tmux via OSC 52)
bind -T copy-mode    MouseDragEnd1Pane send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# ── Pane Navigation (hjkl, no prefix needed via Alt) ─────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+hjkl — prefix-free navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Pane Resize (repeatable with prefix held) ─────────────────
bind -r Left  resize-pane -L 3
bind -r Down  resize-pane -D 3
bind -r Up    resize-pane -U 3
bind -r Right resize-pane -R 3

# ── Splits (open in current path) ────────────────────────────
bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Smart pane toggles ────────────────────────────────────────
# =  → bottom-quarter pane: create at 25% height if none below, else focus it
# /  → right-third pane:    create at 33% width  if none right, else focus it
bind = if-shell '[ "#{pane_at_bottom}" = "1" ]' \
    'split-window -v -l 25% -c "#{pane_current_path}"' \
    'select-pane -D'
bind / if-shell '[ "#{pane_at_right}" = "1" ]' \
    'split-window -h -l 33% -c "#{pane_current_path}"' \
    'select-pane -R'

# ── Window navigation ─────────────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-Tab next-window
bind -r p swap-window -t -1 \; select-window -t -1
bind -r n swap-window -t +1 \; select-window -t +1

# ── Pane swap ────────────────────────────────────────────────
bind . swap-pane -D
bind , swap-pane -U
bind z resize-pane -Z   # zoom toggle

# ── Activity ─────────────────────────────────────────────────
setw -g monitor-activity on
set  -g visual-activity off

# ── Automatic window rename: shell→dir, ssh→user@host, other→dir>cmd
setw -g automatic-rename on
setw -g automatic-rename-format "#{?#{==:#{pane_current_command},ssh},#($HOME/.tmux/scripts/ssh_label.sh #{pane_pid}),#{?#{m:*sh,#{pane_current_command}},#{b:pane_current_path},#{b:pane_current_path}>#{pane_current_command}}}"

# ── Transparent pane backgrounds (Ghostty blur shows through) ─
set -g window-style        'bg=default'
set -g window-active-style 'bg=default'

# ── Status: 2 lines at top ───────────────────────────────────
set -g status 2
set -g status-position top
set -g status-style    "bg=default,fg=colour250"
set -g status-interval 5

# colour palette reference:
#   colour75=sky  colour82=green  colour141=purple  colour214=amber
#   colour203=coral  colour51=cyan  colour220=gold  colour177=pink
#   colour232=nearblack  colour238=darkgray  colour240=gray  colour250=nearwhite

# ── Line 0: Brand pill + identity  |  native window tabs (right) ──────
# Window tabs use native #{W:...} format for instant updates on switch
# Pill caps: ▌▐ (U+258C/U+2590) for brand pill; Nerd Font (U+E0B6/U+E0B4) for tabs
# Normal mode: per-window color cycling with rounded pill for active tab
# Remote mode (F12): all tabs dimmed; active tab uses muted grey pill
set -g status-format[0] "#{?#{==:#{key-table},off},#[fg=colour203]▌#[bg=colour203]#[fg=colour232]#[bold] ⇥ REMOTE #[bg=default]#[fg=colour203]▐#[default]  ,#[fg=colour75]▌#[bg=colour75]#[fg=colour232]#[bold] ≋ ZenGarden #[bg=default]#[fg=colour75]▐#[default]  }#[align=right]#{W:#{?#{==:#{key-table},off},#{?#{window_active},#[bg=default]#[fg=colour238]#[bg=colour238]#[fg=colour250]#[bold] #{window_index}:#{window_name}#{?#{>:#{window_panes},1}, |...,}#{?#{window_zoomed_flag}, Z,}#{?#{window_activity_flag},!,} #[bg=default]#[fg=colour238]#[default] ,#[fg=colour240]#[dim] #{window_index}:#{window_name}#{?#{>:#{window_panes},1}, |...,}#{?#{window_zoomed_flag}, Z,}#{?#{window_activity_flag},!,} #[default]},#{?#{window_active},#[bg=default]#{?#{==:#{window_index},1},#[fg=colour75],#{?#{==:#{window_index},2},#[fg=colour141],#{?#{==:#{window_index},3},#[fg=colour82],#{?#{==:#{window_index},4},#[fg=colour214],#{?#{==:#{window_index},5},#[fg=colour203],#{?#{==:#{window_index},6},#[fg=colour51],#{?#{==:#{window_index},7},#[fg=colour220],#{?#{==:#{window_index},8},#[fg=colour177],#{?#{==:#{window_index},9},#[fg=colour208],#[fg=colour250]}}}}}}}}}#{?#{==:#{window_index},1},#[bg=colour75],#{?#{==:#{window_index},2},#[bg=colour141],#{?#{==:#{window_index},3},#[bg=colour82],#{?#{==:#{window_index},4},#[bg=colour214],#{?#{==:#{window_index},5},#[bg=colour203],#{?#{==:#{window_index},6},#[bg=colour51],#{?#{==:#{window_index},7},#[bg=colour220],#{?#{==:#{window_index},8},#[bg=colour177],#{?#{==:#{window_index},9},#[bg=colour208],#[bg=colour250]}}}}}}}}}#[fg=colour232]#[bold] #{window_index}:#{window_name}#{?#{>:#{window_panes},1}, |...,}#{?#{window_zoomed_flag}, Z,}#{?#{window_activity_flag},!,} #[bg=default]#{?#{==:#{window_index},1},#[fg=colour75],#{?#{==:#{window_index},2},#[fg=colour141],#{?#{==:#{window_index},3},#[fg=colour82],#{?#{==:#{window_index},4},#[fg=colour214],#{?#{==:#{window_index},5},#[fg=colour203],#{?#{==:#{window_index},6},#[fg=colour51],#{?#{==:#{window_index},7},#[fg=colour220],#{?#{==:#{window_index},8},#[fg=colour177],#{?#{==:#{window_index},9},#[fg=colour208],#[fg=colour250]}}}}}}}}}#[default] ,#{?#{==:#{window_index},1},#[fg=colour75],#{?#{==:#{window_index},2},#[fg=colour141],#{?#{==:#{window_index},3},#[fg=colour82],#{?#{==:#{window_index},4},#[fg=colour214],#{?#{==:#{window_index},5},#[fg=colour203],#{?#{==:#{window_index},6},#[fg=colour51],#{?#{==:#{window_index},7},#[fg=colour220],#{?#{==:#{window_index},8},#[fg=colour177],#{?#{==:#{window_index},9},#[fg=colour208],#[fg=colour250]}}}}}}}}}#[nobold]#[dim] #{window_index}:#{window_name}#{?#{>:#{window_panes},1}, |...,}#{?#{window_zoomed_flag}, Z,}#{?#{window_activity_flag},!,} #[default]}}} "

# ── Line 1: Session pill + prefix alert (left)  |  stats (right) ────
# NOTE: never put commas inside #[...] within #{?...} — tmux splits on them
set -g status-format[1] "#[bg=default]#{?client_prefix,#[fg=colour214]▌#[bg=colour214]#[fg=colour232]#[bold] ≋ PREFIX #[bg=default]#[fg=colour214]▐#[nobold]  ,}#[fg=colour24]▌#[bg=colour24]#[fg=colour255]#[bold] #S #[bg=default]#[fg=colour24]▐#[default] #[align=right]#($HOME/.tmux/scripts/cpu.sh) #[fg=colour238]│ #($HOME/.tmux/scripts/memory.sh) #[fg=colour238]│ #($HOME/.tmux/scripts/gpu.sh) #[fg=colour238]│ #[fg=colour75]#[bold]%H:%M#[nobold] #[fg=colour250]%a %b %d  "

# ── Nested tmux: F12 suspends/resumes local key interception ─
# Press F12 → all keys pass through to inner (remote) tmux
# Press F12 again → local tmux resumes control
bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    refresh-client -S
bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    refresh-client -S

# ── Inner tmux — Ctrl-key layer (Ghostty + MacBook) ──────────
# Control an inner (SSH-remote) tmux from the outer tmux without activating
# F12 REMOTE mode.  Pattern: add Ctrl (or Ctrl+Alt) to the outer binding.
# F12 REMOTE mode still works as before — these bindings are additive.
# Requires extended-keys on (set above) + Ghostty for key disambiguation.
#
# Optional: add Ghostty keybindings to reduce further to single-keystroke
# (send outer prefix sequence + command byte in one Ghostty keybind action).
# See README §Inner tmux for details.

# Inner pane navigation: Ctrl+Alt+h/j/k/l (prefix-free)
bind -n C-M-h send-keys M-h
bind -n C-M-j send-keys M-j
bind -n C-M-k send-keys M-k
bind -n C-M-l send-keys M-l

# Inner window select: Ctrl+Alt+1..9 (prefix-free)
bind -n C-M-1 send-keys M-1
bind -n C-M-2 send-keys M-2
bind -n C-M-3 send-keys M-3
bind -n C-M-4 send-keys M-4
bind -n C-M-5 send-keys M-5
bind -n C-M-6 send-keys M-6
bind -n C-M-7 send-keys M-7
bind -n C-M-8 send-keys M-8
bind -n C-M-9 send-keys M-9

# Inner next window: Ctrl+Alt+Tab (prefix-free)
bind -n C-M-Tab send-keys M-Tab

# Inner new window:  prefix + Ctrl+c
bind C-c send-keys C-Space c
# Inner close pane:  prefix + Ctrl+x
bind C-x send-keys C-Space x
# Inner zoom toggle: prefix + Ctrl+z
bind C-z send-keys C-Space z
# Inner reload config: prefix + Ctrl+r
bind C-r send-keys C-Space r

# Inner splits (prefix + Ctrl + key)
bind 'C-\' send-keys C-Space '\'
bind 'C--' send-keys C-Space '-'
bind 'C-=' send-keys C-Space '='
bind 'C-/' send-keys C-Space '/'

# Inner swap window: prefix + Ctrl+p / prefix + Ctrl+n
bind C-p send-keys C-Space p
bind C-n send-keys C-Space n

# Inner resize pane (coarse, repeatable): prefix + Ctrl+←/↓/↑/→
bind -r C-Left  send-keys C-Space Left
bind -r C-Down  send-keys C-Space Down
bind -r C-Up    send-keys C-Space Up
bind -r C-Right send-keys C-Space Right

# Inner pane swap down/up: prefix + Ctrl+. / Ctrl+,
bind C-. send-keys C-Space .
bind C-, send-keys C-Space ,

# Inner copy mode: prefix + Ctrl+[  (CSI u only — not Escape)
# With extended-keys on, tmux distinguishes \x1b[91;5u (Ctrl+[) from \x1b (Escape).
bind 'C-[' send-keys C-Space '['

# ── Pane border ──────────────────────────────────────────────
set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour75"
# Persistent pinned header: user@host + dir + venv + git (visible on multi-pane windows)
set -g pane-border-status top
set -g pane-border-format "#{?pane_active, #[fg=colour82]#[bold]#{user}#[fg=colour244]@#[fg=colour250]#{host_short}#[nobold] #[fg=colour75], #[fg=colour240]#[dim]#{user}#[fg=colour238]@#{host_short}#[nodim] #[fg=colour238]}#($HOME/.tmux/scripts/pane_git.sh #{pane_current_path} #{pane_pid})#[default] "

# ── Message / command bar ─────────────────────────────────────
set -g message-style         "bg=colour238,fg=colour214,bold"
set -g message-command-style "bg=colour238,fg=colour82"

# ── Clock ────────────────────────────────────────────────────
setw -g clock-mode-colour colour75
setw -g clock-mode-style  24
