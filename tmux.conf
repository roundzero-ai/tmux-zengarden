# ============================================================
#  tmux ZenGarden — modern 256-color config
#  Compatible: macOS (Apple Silicon / Intel), Linux (DGX Spark)
# ============================================================

# ── Terminal & Colors ────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",ghostty:RGB"
set -ag terminal-overrides ",*256col*:Tc"

# ── General ──────────────────────────────────────────────────
set -g history-limit 100000
set -g display-time 3000
set -g status-interval 5
set -g focus-events on
set -g escape-time 10
setw -g aggressive-resize on

# ── Mouse ────────────────────────────────────────────────────
set -g mouse on

# ── Index from 1 (easier keyboard access) ────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Prefix: Ctrl-s ───────────────────────────────────────────
# Note: Ctrl-s is XON/XOFF flow control in terminals. Disable it with:
#   stty -ixon   (add to ~/.zshrc or ~/.bashrc)
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# ── Reload ───────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display " Config reloaded"

# ── Vi mode ──────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Pane Navigation (hjkl, no prefix needed via Alt) ─────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+hjkl — prefix-free navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Pane Resize (repeatable with prefix held) ─────────────────
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# Fine-grain resize with Shift
bind -r M-H resize-pane -L 1
bind -r M-J resize-pane -D 1
bind -r M-K resize-pane -U 1
bind -r M-L resize-pane -R 1

# ── Splits (open in current path) ────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Window navigation ─────────────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-[ previous-window
bind -n M-] next-window
bind Tab last-window

# ── Pane swap ────────────────────────────────────────────────
bind > swap-pane -D
bind < swap-pane -U
bind z resize-pane -Z   # zoom toggle

# ── Activity ─────────────────────────────────────────────────
setw -g monitor-activity on
set  -g visual-activity off

# ── Automatic window rename using pane path ──────────────────
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"

# ── Transparent pane backgrounds (Ghostty blur shows through) ─
set -g window-style        'bg=default'
set -g window-active-style 'bg=default'

# ── Status: 2 lines at top ───────────────────────────────────
set -g status 2
set -g status-position top
set -g status-style    "bg=default,fg=colour250"
set -g status-interval 5

# colour palette reference:
#   colour75=sky  colour82=green  colour141=purple  colour214=amber
#   colour203=coral  colour51=cyan  colour220=gold  colour177=pink
#   colour232=nearblack  colour238=darkgray  colour240=gray  colour250=nearwhite

# ── Line 0: Brand pill + identity  |  colored window tabs (right) ──
# Pill caps use standard Unicode block chars (▌▐) — no Nerd Font required
# ▌ U+258C left-half block   ▐ U+2590 right-half block
# fg=pill-color + bg=default creates a soft half-colored edge against transparent bg
# U+224B ≋ = three wavy lines — zen garden rake motif
set -g status-format[0] "#[fg=colour75]▌#[bg=colour75]#[fg=colour232]#[bold] ≋ ZenGarden #[bg=default]#[fg=colour75]▐#[default]  #[fg=colour82]#{USER}#[fg=colour244]@#[fg=colour250]#h#[align=right]#($HOME/.tmux/scripts/window_tabs.sh) "

# ── Line 1: Session pill + prefix alert (left)  |  stats (right) ────
# NOTE: never put commas inside #[...] within #{?...} — tmux splits on them
set -g status-format[1] "#[bg=default]#{?client_prefix,#[fg=colour214]▌#[bg=colour214]#[fg=colour232]#[bold] ≋ PREFIX #[bg=default]#[fg=colour214]▐#[nobold]  ,}#[fg=colour24]▌#[bg=colour24]#[fg=colour255]#[bold] #S #[bg=default]#[fg=colour24]▐#[default] #[align=right]#[fg=colour240]#($HOME/.tmux/scripts/git_status.sh #{pane_current_path}) #[fg=colour238]│ #($HOME/.tmux/scripts/cpu.sh) #[fg=colour238]│ #($HOME/.tmux/scripts/memory.sh) #[fg=colour238]│ #($HOME/.tmux/scripts/gpu.sh) #[fg=colour238]│ #[fg=colour75]#[bold]%H:%M#[nobold] #[fg=colour240]%a %b %d  "

# ── Pane border ──────────────────────────────────────────────
set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour75"

# ── Message / command bar ─────────────────────────────────────
set -g message-style         "bg=colour238,fg=colour214,bold"
set -g message-command-style "bg=colour238,fg=colour82"

# ── Clock ────────────────────────────────────────────────────
setw -g clock-mode-colour colour75
setw -g clock-mode-style  24
